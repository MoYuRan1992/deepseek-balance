<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#7a2cff"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0,210,255,0)"/>
      <stop offset="30%" stop-color="#00d2ff"/>
      <stop offset="70%" stop-color="#7a2cff"/>
      <stop offset="100%" stop-color="rgba(122,44,255,0)"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>

  <g opacity="0.08" stroke="#00d2ff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(0,210,255,0.15)" stroke-width="2"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(122,44,255,0.1)" stroke-width="1.5"/>

  <line x1="40" y1="256" x2="472" y2="256" stroke="url(#lineGrad)" stroke-width="3" filter="url(#neonGlow)" opacity="0.6"/>

  <g filter="url(#neonGlow)">
    <path d="M 102 360 L 162 140 L 222 360 L 192 280 L 132 280 Z" fill="url(#textGrad)"/>
    <path d="M 192 280 L 162 360 L 132 280 Z" fill="rgba(0,210,255,0.2)" stroke="#00d2ff" stroke-width="2"/>

    <path d="M 262 150 L 262 360 L 302 360 L 302 280 Q 342 280 342 240 Q 342 200 302 200 L 262 200 Z" fill="url(#textGrad)"/>
    <circle cx="302" cy="240" r="30" fill="none" stroke="#00d2ff" stroke-width="4"/>
    <circle cx="302" cy="240" r="10" fill="#7a2cff" opacity="0.8"/>

    <circle cx="392" cy="180" r="14" fill="#00d2ff"/>
    <circle cx="392" cy="256" r="18" fill="url(#textGrad)"/>
    <circle cx="392" cy="332" r="14" fill="#7a2cff"/>
    <line x1="392" y1="194" x2="392" y2="238" stroke="rgba(0,210,255,0.3)" stroke-width="4"/>
    <line x1="392" y1="274" x2="392" y2="318" stroke="rgba(122,44,255,0.3)" stroke-width="4"/>
  </g>

  <rect width="512" height="512" rx="112" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="6"/>
